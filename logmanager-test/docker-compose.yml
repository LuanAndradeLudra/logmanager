services:
  init:
    image: alpine:3.19
    container_name: driver-monitoring-init
    volumes:
      - ./:/var/www
    working_dir: /var/www
    environment:
      WWWUSER: ${WWWUSER:-1000}
      WWWGROUP: ${WWWGROUP:-1000}
    command: ["/bin/sh", "/var/www/docker/php/init-permissions.sh"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: driver-monitoring-app
    user: "${WWWUSER:-1000}:${WWWGROUP:-1000}"
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      init:
        condition: service_completed_successfully
      mysql:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: driver-monitoring-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: driver-monitoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: driver_monitoring
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
